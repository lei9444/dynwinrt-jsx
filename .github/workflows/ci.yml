name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  source-and-package:
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Use Node.js 24.12.0
        uses: actions/setup-node@v4
        with:
          node-version: 24.12.0
          cache: npm

      - name: Install exact dependencies
        run: npm ci

      - name: Build, typecheck, and test
        run: npm run check

      - name: Pack without rerunning scripts
        shell: pwsh
        run: |
          npm pack --ignore-scripts --json | Out-File pack.json -Encoding utf8
          $package = (Get-Content pack.json -Raw | ConvertFrom-Json)[0]
          $package.filename | Out-File package-name.txt -Encoding ascii

      - name: Verify package contract
        shell: pwsh
        run: |
          $package = Get-Content package-name.txt -Raw
          $entries = @(tar -tf $package.Trim())
          $required = @(
            'package/dist/index.js',
            'package/dist/index.d.ts',
            'package/dist/navigation.js',
            'package/dist/dialog.js',
            'package/dist/hot.js',
            'package/bin/create.js',
            'package/templates/winui/dev.js',
            'package/templates/winui/src/app.tsx',
            'package/templates/winui/src/winui-worker.tsx',
            'package/README.md',
            'package/LICENSE'
          )
          foreach ($entry in $required) {
            if ($entries -notcontains $entry) {
              throw "Package is missing required entry: $entry"
            }
          }
          $allowed = @(
            'package/package.json',
            'package/README.md',
            'package/CHANGELOG.md',
            'package/LICENSE'
          )
          $unexpected = @(
            $entries | Where-Object {
              $_ -notmatch '^package/(dist|bin|templates|docs)/' -and
              $_ -notin $allowed
            }
          )
          if ($unexpected.Count -gt 0) {
            throw "Unexpected package entries: $($unexpected -join ', ')"
          }

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: dynwinrt-jsx-package
          path: |
            dynwinrt-jsx-*.tgz
            pack.json

# Native WinUI/UIA validation requires an interactive desktop plus sibling
# dynwinrt and winappCli source artifacts. Keep those checks in the repository's
# local smoke scripts or run them on a dedicated self-hosted desktop runner.
